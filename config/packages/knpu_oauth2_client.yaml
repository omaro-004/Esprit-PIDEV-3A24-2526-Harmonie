knpu_oauth2_client:
    clients:
        # ── Google ──────────────────────────────────────────────────────────
        google:
            type: google
            client_id: '%env(GOOGLE_CLIENT_ID)%'
            client_secret: '%env(GOOGLE_CLIENT_SECRET)%'
            redirect_route: connect_google_check
            redirect_params: {}
            # Scopes demandés : email + profil (inclus par défaut avec openid)
            # use_state: true (activé par défaut pour la sécurité CSRF)

        # ── Google Login (séparé du Calendar) ─────────────────────────────
        google_login:
            type: google
            client_id: '%env(GOOGLE_LOGIN_CLIENT_ID)%'
            client_secret: '%env(GOOGLE_LOGIN_CLIENT_SECRET)%'
            redirect_route: connect_google_check
            redirect_params: {}
            # Scopes envoyés depuis le contrôleur OAuth.

        # ── Facebook ─────────────────────────────────────────────────────────
        facebook:
            type: facebook
            client_id: '%env(FACEBOOK_CLIENT_ID)%'
            client_secret: '%env(FACEBOOK_CLIENT_SECRET)%'
            redirect_route: connect_facebook_check
            redirect_params: {}
            graph_api_version: 'v20.0'
