# config/services.yaml
parameters:

    posts_images_directory: '%kernel.project_dir%/public/uploads/posts'

services:
    _defaults:
        autowire: true
        autoconfigure: true


    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # QrCodeService déclaré manuellement (stable avec Symfony 7.4)
    App\Service\QrCodeService:
        public: true

    # ── Spoonacular API Service ────────────────────────────────────────────────
    # Lie la variable d'environnement SPOONACULAR_API_KEY à l'argument $spoonacularApiKey
    # du constructeur de SpoonacularService.
    App\Service\SpoonacularService:
        arguments:
            $spoonacularApiKey: '%env(SPOONACULAR_API_KEY)%'

    # ── YouTube Data API v3 Service ───────────────────────────────────────────
    # Lie la variable d'environnement YOUTUBE_API_KEY à l'argument $youtubeApiKey
    # du constructeur de YouTubeService.
    # Le HttpClientInterface est injecté automatiquement par autowire.
    App\Service\YouTubeService:
        arguments:
            $youtubeApiKey: '%env(YOUTUBE_API_KEY)%'

    # ── Google Gemini Vision API Service ─────────────────────────────────────
    # Lie la variable d'environnement GEMINI_API_KEY à l'argument $geminiApiKey
    # du constructeur de GeminiVisionService.
    # Utilisé pour l'analyse de photos de repas par IA (Gemini 1.5 Flash).
    App\Service\GeminiVisionService:
        arguments:
            $geminiApiKey: '%env(GEMINI_API_KEY)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\EventListener\TrustedHostListener:
        tags:
            - { name: kernel.event_subscriber }

    App\Service\GroqService:
        arguments:
            $groqApiKey:    '%env(GROQ_API_KEY)%'
            $groqChatUrl:   '%env(GROQ_CHAT_URL)%'
            $groqSttUrl:    '%env(GROQ_STT_URL)%'
            $groqChatModel: '%env(GROQ_CHAT_MODEL)%'
            $groqSttModel:  '%env(GROQ_STT_MODEL)%'
    # ── Blessure & Récupération (nouveau module) ──────────────────────────────
    # Utilise le même Groq pour les conseils de récupération des blessures sportives.
    App\Service\BlessureService:
        arguments:
            $groqApiKey:    '%env(GROQ_API_KEY)%'
            $groqChatUrl:   '%env(GROQ_CHAT_URL)%'
            $groqChatModel: '%env(GROQ_CHAT_MODEL)%'

    App\Service\Github\GithubIssueService:
        arguments:
            $projectDir:    '%kernel.project_dir%'
            $defaultToken:  '%env(GITHUB_TOKEN)%'
            $defaultRepo:   '%env(GITHUB_REPO)%'
            $defaultBranch: 'main'

    App\Service\Telegram\TelegramNotifier:
        arguments:
            $botToken: '%env(TELEGRAM_BOT_TOKEN)%'
            $chatId:   '%env(TELEGRAM_CHAT_ID)%'

    App\Service\Telegram\EventReminderService:
        arguments:
            $botToken: '%env(TELEGRAM_BOT_TOKEN)%'
# ----------------------résumé -------------------------------------------
    App\Service\SummaryService:
        arguments:
            $apiKey: '%env(GROQ_API_KEY)%'

# ----------------------sentiment -------------------------------------------
    App\Service\SentimentService:
        arguments:
            $apiKey: '%env(GROQ_API_KEY)%'
#--------------------suggest titre -----------------
    App\Service\MistralService:
        arguments:
            $apiKey: '%env(GROQ_API_KEY)%'
#--------------------FactCheckService -----------------
    App\Service\FactCheckService:
        arguments:
            $apiKey: '%env(GROQ_API_KEY)%'