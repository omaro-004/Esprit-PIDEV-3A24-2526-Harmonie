[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.intl", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.gd"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction"]

[phases.build]
cmds = [
  "php bin/console cache:warmup --env=prod",
  "php bin/console doctrine:migrations:migrate --no-interaction --env=prod --allow-no-migration"
]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public/"
