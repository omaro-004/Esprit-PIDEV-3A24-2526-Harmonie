[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.gd",
  "php82Extensions.zip",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.mbstring",
  "php82Extensions.intl",
  "php82Extensions.curl",
  "php82Extensions.sodium",
  "php82Extensions.xml",
  "php82Extensions.dom",
  "php82Extensions.tokenizer",
  "php82Extensions.ctype",
  "php82Extensions.iconv",
  "php82Extensions.simplexml",
  "php82Extensions.xmlwriter",
  "php82Extensions.fileinfo",
  "composer"
]

[phases.build]
cmds = [
  "composer install --optimize-autoloader --no-scripts --no-interaction --ignore-platform-reqs"
]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public/"
